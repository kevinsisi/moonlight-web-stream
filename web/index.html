<!DOCTYPE html>
<html lang="en" class="notranslate">

<head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#00111f" />
    <meta name="color-scheme" content="dark" />
    <title>Moonlight</title>
    <link rel="icon" href="resources/moonlight.svg" sizes="any" type="image/svg+xml">
    <link rel="apple-touch-icon" href="resources/moonlight.svg">

    <link rel="stylesheet" href="styles/standard.css" id="style">
    <script type="module" src="styles/index.js"></script>

    <script src="pwa.js" defer></script>
    <script type="module" src="index.js" defer></script>

    <!-- Manifest for Mobile Apps as Website -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
    <meta name="description" content="Moonlight Web for game streaming with your pc" />
    <link rel="manifest" href="manifest.json">

    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Moonlight Web">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no" />

    <script>
        try {
            const raw = localStorage.getItem("mlSettings");
            const parsed = raw ? JSON.parse(raw) : null;
            const language = parsed && (parsed.language === "zh-CN" || parsed.language === "zh" || parsed.language === "zh_CN")
                ? "zh-CN"
                : "en";
            document.documentElement.lang = language;
            document.documentElement.translate = false;
            document.documentElement.classList.add("notranslate");
        } catch (_err) { }
    </script>
</head>

<body>
    <!-- Modal -->
    <div id="modal-overlay" class="modal-background modal-disabled">
        <!-- Modal Content -->
        <div id="modal-parent" class="modal-content">
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu-background context-menu-disabled">
    </div>

    <!-- Notification -->
    <div id="notification-list">
    </div>

    <!-- Errors -->
    <div id="error-list">
    </div>

    <!-- Main App View -->
    <div id="root" class="root">
    </div>

</body>

</html>
